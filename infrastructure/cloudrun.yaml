apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: fabpulse-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-throttling: "false"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: fabpulse-api@fabpulse-prod.iam.gserviceaccount.com
      containers:
        - image: us-central1-docker.pkg.dev/fabpulse-prod/fabpulse/api:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
          env:
            - name: ENVIRONMENT
              value: production
            - name: GOOGLE_CLOUD_PROJECT
              value: fabpulse-prod
            - name: VERTEX_AI_LOCATION
              value: us-central1
            - name: GEMINI_MODEL
              value: gemini-1.5-pro
            # Secrets are injected via Cloud Run Secret Manager integration
            # Configure via: gcloud run services update fabpulse-api --update-secrets
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-url
                  key: latest
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-anon-key
                  key: latest
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-service-role-key
                  key: latest
            - name: SUPABASE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-jwt-secret
                  key: latest
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: latest
