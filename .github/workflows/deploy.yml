name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy.yml"

env:
  PROJECT_ID: fabpulse-prod
  REGION: us-central1
  SERVICE: fabpulse-api
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/fabpulse-prod/fabpulse/api

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        working-directory: apps/api
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }} .
          docker push ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }}
          docker tag ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }} ${{ env.ARTIFACT_REGISTRY }}:latest
          docker push ${{ env.ARTIFACT_REGISTRY }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }}

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
