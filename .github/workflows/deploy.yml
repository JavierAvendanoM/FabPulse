name: Deploy API to Cloud Run

on:
  push:
    branches: [master]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy.yml"

env:
  PROJECT_ID: fabpulse-prod
  REGION: us-central1
  SERVICE: fabpulse-api
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/fabpulse-prod/fabpulse/api

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/978934723078/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@fabpulse-prod.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        working-directory: apps/api
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }} .
          docker push ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }}
          docker tag ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }} ${{ env.ARTIFACT_REGISTRY }}:latest
          docker push ${{ env.ARTIFACT_REGISTRY }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }}
          env_vars: |
            ENVIRONMENT=production
            GOOGLE_CLOUD_PROJECT=fabpulse-prod
            VERTEX_AI_LOCATION=us-central1
            GEMINI_MODEL=gemini-1.5-pro
          secrets: |
            SUPABASE_URL=supabase-url:latest
            SUPABASE_ANON_KEY=supabase-anon-key:latest
            SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest
            SUPABASE_JWT_SECRET=supabase-jwt-secret:latest
            DATABASE_URL=database-url:latest
          flags: '--service-account=fabpulse-api@fabpulse-prod.iam.gserviceaccount.com'

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
